{% extends "base.html" %}
{% block title %}Iniciar Sesión - Robinson Controles VDF{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <h3 class="text-center fw-bold mb-4" style="color: #1e3a5f;">Iniciar Sesión</h3>
                    <p class="text-center text-muted mb-4">Ingresa tu email y contraseña.</p>
                    
                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="correo@ejemplo.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control form-control-lg" required>
                        </div>
                        <button type="submit" class="btn w-100 btn-lg" style="background-color: #01F78A; color: #000; font-weight: bold;">Entrar</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <small>¿No tienes cuenta? <a href="/register" class="text-decoration-none fw-bold" style="color: #8E3EBD;">Inscríbete aquí</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
